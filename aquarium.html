<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5efe6">
<link rel="manifest" href="manifest.json">
<title>🐟 水槽シミュレーション</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5efe6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Zen Maru Gothic', sans-serif;
    overflow: hidden;
    user-select: none;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ===== ステータスバー（水槽上部） ===== */
  .status-bar {
    width: min(800px, calc(100vw - 40px));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 6px 14px;
    margin-bottom: 6px;
    background: linear-gradient(145deg, #f8f2e6, #efe5d0);
    border: 2px solid #c8b890;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(120,100,60,0.12), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* ===== ゲームパネル ===== */
  .game-panel {
    width: min(800px, calc(100vw - 40px));
    background: linear-gradient(145deg, #f8f2e6, #efe5d0);
    border: 2px solid #c8b890;
    border-radius: 16px;
    padding: 10px 14px;
    margin-top: 6px;
    box-shadow: 0 2px 10px rgba(120,100,60,0.15), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  .coin-display {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(220,180,80,0.15);
    border: 1.5px solid rgba(200,170,80,0.35);
    border-radius: 14px;
    padding: 4px 12px;
    color: #b8922a;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.3s;
  }
  .coin-display.flash {
    background: rgba(220,180,80,0.3);
    transform: scale(1.08);
  }

  .progress-display {
    font-size: 0.72rem;
    color: #6a8a60;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .progress-display .prog-bar {
    width: 48px;
    height: 6px;
    background: rgba(140,180,140,0.2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-display .prog-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #8cc8a0, #e8c86a);
    transition: width 0.5s;
  }

  .income-display {
    color: #b8922a;
    font-size: 0.72rem;
  }

  .gp-buttons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .gp-btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 10px;
    border: 1.5px solid rgba(140,180,140,0.3);
    border-radius: 12px;
    background: rgba(255,250,240,0.7);
    color: #5a7a5a;
    cursor: pointer;
    transition: all 0.2s;
  }
  .gp-btn:hover {
    background: rgba(140,180,140,0.2);
    border-color: #7ab880;
    transform: translateY(-1px);
  }
  .gp-btn:active { transform: scale(0.95); }
  .gp-btn.active-toggle {
    background: rgba(140,180,140,0.25);
    border-color: #6aaa70;
    box-shadow: 0 1px 4px rgba(100,150,100,0.2);
  }
  .gp-btn-icon { font-size: 1.2rem; line-height: 1; }
  .gp-btn-label { font-size: 0.55rem; line-height: 1; }
  .gp-btn-danger { border-color: rgba(255,80,80,0.3); }
  .gp-btn-danger:hover {
    background: rgba(255,60,60,0.12);
    border-color: rgba(255,80,80,0.5);
  }

  /* イベントログ */
  .gp-log {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1.5px solid rgba(180,160,120,0.2);
    max-height: 60px;
    overflow-y: auto;
    font-size: 0.65rem;
    color: #8a9a80;
    line-height: 1.6;
  }
  .gp-log:empty { display: none; }
  .gp-log-entry {
    display: flex;
    gap: 6px;
  }
  .gp-log-time {
    color: #b8a880;
    flex-shrink: 0;
  }

  /* エサ選択ドロップアップ */
  .hud-food-wrap { position: relative; }
  .hud-food-panel {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(250,245,235,0.97);
    border: 1.5px solid #c8b890;
    border-radius: 12px;
    padding: 8px;
    gap: 4px;
    flex-direction: column;
    min-width: 140px;
    box-shadow: 0 -4px 16px rgba(120,100,60,0.15);
    z-index: 6;
  }
  .hud-food-panel.open { display: flex; }
  .hud-food-panel > span {
    color: #8a9a80;
    font-size: 0.65rem;
    text-align: center;
    margin-bottom: 2px;
  }

  .tank-wrapper {
    position: relative;
    border-radius: 18px;
    padding: 6px;
    background: linear-gradient(135deg, #d4c4a8, #c0b090);
    box-shadow: 0 3px 15px rgba(120,100,60,0.2), inset 0 2px 4px rgba(255,255,255,0.3);
    border: 2px solid #bba880;
  }

  canvas { display: block; border-radius: 12px; cursor: pointer; }

  .coin-popup {
    position: absolute;
    color: #c8960a;
    font-weight: 700;
    font-size: 0.9rem;
    pointer-events: none;
    animation: coinPop 1s ease-out forwards;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    z-index: 10;
  }
  @keyframes coinPop {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
  }

  .fish-tooltip {
    position: absolute;
    background: rgba(255,250,240,0.95);
    border: 2px solid #c8b890;
    border-radius: 12px;
    padding: 8px 14px;
    color: #5a4a30;
    font-size: 0.78rem;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(120,100,60,0.15);
  }
  .fish-tooltip.visible { opacity: 1; }
  .fish-tooltip .tt-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 2px; color:#4a6a50; }
  .fish-tooltip .tt-greeting { color: #7a9a80; }
  .fish-tooltip .tt-stats { color: #b8922a; font-size: 0.7rem; margin-top: 3px; }

  .notification {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,250,240,0.92);
    border: 2px solid #c8b890;
    border-radius: 16px;
    padding: 8px 20px;
    color: #5a4a30;
    font-size: 0.8rem;
    z-index: 30;
    animation: notifAnim 3s ease-out forwards;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(120,100,60,0.15);
  }
  @keyframes notifAnim {
    0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    10% { opacity: 1; transform: translateX(-50%) translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  .food-btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    padding: 5px 10px;
    border: 1.5px solid rgba(140,180,140,0.3);
    border-radius: 10px;
    background: rgba(255,250,240,0.8);
    color: #5a7a5a;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-align: left;
  }
  .food-btn:hover { background: rgba(140,180,140,0.15); }
  .food-btn.active {
    background: rgba(140,180,140,0.2);
    border-color: #7ab880;
  }
  .food-btn.locked { opacity: 0.35; cursor: not-allowed; }


  .shop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(120,110,80,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .shop-overlay.open { display: flex; }

  .shop-panel {
    background: linear-gradient(145deg, #faf5ea, #f0e8d8);
    border: 2px solid #c8b890;
    border-radius: 20px;
    padding: 28px 32px;
    max-width: 560px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 4px 20px rgba(120,100,60,0.2);
  }

  .shop-title {
    color: #b8922a;
    font-size: 1.3rem;
    text-align: center;
    margin-bottom: 6px;
  }
  .shop-coins {
    text-align: center;
    color: #b8922a;
    font-size: 0.9rem;
    margin-bottom: 18px;
    opacity: 0.8;
  }
  .shop-section-title {
    color: #5a8a60;
    font-size: 0.85rem;
    margin: 16px 0 10px;
    padding-bottom: 4px;
    border-bottom: 2px solid rgba(140,180,140,0.25);
  }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: rgba(140,180,140,0.06);
    border: 1px solid rgba(140,180,140,0.15);
    transition: all 0.2s;
  }
  .shop-item:hover {
    background: rgba(140,180,140,0.12);
    border-color: rgba(140,180,140,0.3);
  }
  .shop-item-icon { font-size: 1.8rem; min-width: 36px; display: flex; align-items: center; justify-content: center; }
  .shop-item-icon img { border-radius: 6px; background: rgba(140,180,140,0.08); }
  .shop-item-info { flex: 1; }
  .shop-item-name { color: #4a5a40; font-size: 0.9rem; font-weight: 700; }
  .shop-item-desc { color: #8a9a80; font-size: 0.7rem; margin-top: 2px; }

  .shop-buy-btn {
    font-family: 'Zen Maru Gothic', sans-serif;
    padding: 6px 14px;
    border: 2px solid rgba(200,170,80,0.4);
    border-radius: 14px;
    background: rgba(220,180,80,0.12);
    color: #a07a10;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .shop-buy-btn:hover:not(:disabled) {
    background: rgba(220,180,80,0.25);
    box-shadow: 0 1px 6px rgba(200,170,80,0.2);
  }
  .shop-buy-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .shop-buy-btn.owned {
    border-color: rgba(100, 180, 100, 0.4);
    color: #5aaa60;
    background: rgba(100, 180, 100, 0.1);
  }

  .shop-close {
    display: block;
    margin: 18px auto 0;
    font-family: 'Zen Maru Gothic', sans-serif;
    padding: 8px 28px;
    border: 2px solid rgba(140,180,140,0.35);
    border-radius: 20px;
    background: rgba(140,180,140,0.1);
    color: #5a8a60;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .shop-close:hover { background: rgba(140,180,140,0.2); }

  /* ===== ガチャ演出 ===== */
  .gacha-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0);
    transition: background 0.5s;
  }
  .gacha-overlay.open { display:flex; background:rgba(0,0,0,0.92); }

  /* 扉演出 */
  .gacha-doors {
    position:fixed; inset:0; z-index:201; display:none; pointer-events:none;
  }
  .gacha-door {
    width:50%; height:100%;
    background: linear-gradient(180deg, #1a1a3e 0%, #0d0d2b 50%, #1a1a3e 100%);
    border: none; position:relative; overflow:hidden;
    transition: transform 0.8s cubic-bezier(0.6, 0, 0.2, 1);
  }
  .gacha-door::after {
    content:''; position:absolute; top:0; width:3px; height:100%;
    background: linear-gradient(180deg, transparent, rgba(126,200,227,0.6), rgba(255,215,0,0.6), rgba(126,200,227,0.6), transparent);
  }
  .gacha-door-left::after { right:0; }
  .gacha-door-right::after { left:0; }
  .gacha-door-left { transform-origin:left center; }
  .gacha-door-right { transform-origin:right center; }
  .gacha-doors.open .gacha-door-left { transform:translateX(-105%); }
  .gacha-doors.open .gacha-door-right { transform:translateX(105%); }
  .gacha-door-emblem {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:4rem; opacity:0.3;
  }

  /* 光の柱 */
  .gacha-pillar {
    position:fixed; top:-10%; left:50%; transform:translateX(-50%); z-index:202;
    width:0; height:120%; pointer-events:none;
    background: linear-gradient(180deg, transparent, rgba(126,200,227,0.4), rgba(255,255,255,0.6), rgba(126,200,227,0.4), transparent);
    opacity:0; transition: width 0.4s, opacity 0.3s;
  }
  .gacha-pillar.active { width:120px; opacity:1; }
  .gacha-pillar.rare {
    background: linear-gradient(180deg, transparent, rgba(255,215,0,0.5), rgba(255,255,255,0.8), rgba(255,215,0,0.5), transparent);
    width:200px;
  }

  /* 画面割れ（レア演出） */
  .gacha-crack {
    position:fixed; inset:0; z-index:203; pointer-events:none;
    opacity:0; transition:opacity 0.3s;
  }
  .gacha-crack.active { opacity:1; }
  .gacha-crack svg { width:100%; height:100%; }

  /* カード本体 */
  .gacha-card {
    position:relative; width:280px; text-align:center; z-index:204;
    transform: scale(0) rotateY(180deg);
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .gacha-overlay.reveal .gacha-card { transform: scale(1) rotateY(0deg); }

  .gacha-glow {
    position:absolute; inset:-60px; border-radius:50%;
    background:radial-gradient(circle, rgba(126,200,227,0.2) 0%, transparent 70%);
    animation: gachaPulse 2s ease-in-out infinite;
  }
  .gacha-glow.rare {
    background:radial-gradient(circle, rgba(255,215,0,0.4) 0%, rgba(255,100,0,0.15) 40%, transparent 70%);
    animation: gachaPulseRare 1.5s ease-in-out infinite;
  }
  @keyframes gachaPulse {
    0%, 100% { transform:scale(1); opacity:0.6; }
    50% { transform:scale(1.2); opacity:1; }
  }
  @keyframes gachaPulseRare {
    0%, 100% { transform:scale(1); opacity:0.7; }
    50% { transform:scale(1.4); opacity:1; }
  }

  /* 放射状の光線 */
  .gacha-rays {
    position:absolute; inset:-100px; z-index:0; pointer-events:none;
    opacity:0; transition: opacity 0.5s;
  }
  .gacha-overlay.reveal .gacha-rays { opacity:1; }
  .gacha-ray {
    position:absolute; top:50%; left:50%;
    width:2px; height:150px; transform-origin:bottom center;
    background: linear-gradient(to top, rgba(255,215,0,0.3), transparent);
    animation: rayRotate 8s linear infinite;
  }
  .gacha-rays.rare .gacha-ray {
    background: linear-gradient(to top, rgba(255,215,0,0.6), transparent);
    height:200px; width:3px;
  }
  @keyframes rayRotate { 0%{transform:rotate(var(--r))} 100%{transform:rotate(calc(var(--r) + 360deg))} }

  .gacha-icon {
    font-size:5rem; position:relative; z-index:1;
    filter: drop-shadow(0 0 20px rgba(126,200,227,0.4));
    animation: gachaFloat 2.5s ease-in-out infinite;
  }
  .gacha-icon.rare {
    filter: drop-shadow(0 0 35px rgba(255,215,0,0.9));
    animation: gachaFloat 2s ease-in-out infinite, gachaShine 3s linear infinite;
  }
  @keyframes gachaFloat {
    0%, 100% { transform:translateY(0); }
    50% { transform:translateY(-10px); }
  }
  @keyframes gachaShine {
    0% { filter: drop-shadow(0 0 35px rgba(255,215,0,0.9)) hue-rotate(0deg); }
    100% { filter: drop-shadow(0 0 35px rgba(255,215,0,0.9)) hue-rotate(360deg); }
  }

  .gacha-label {
    color:#7ec8e3; font-size:0.85rem; margin-top:8px; letter-spacing:2px;
    opacity:0; transform:translateY(10px);
    transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
  }
  .gacha-overlay.reveal .gacha-label { opacity:0.8; transform:translateY(0); }
  .gacha-label.rare { color:#ffd700; font-size:1rem; text-shadow:0 0 15px rgba(255,215,0,0.5); }

  .gacha-name {
    color:#fff; font-size:1.5rem; font-weight:900; margin-top:8px;
    text-shadow: 0 0 20px rgba(126,200,227,0.5);
    opacity:0; transform:translateY(15px) scale(0.8);
    transition: opacity 0.4s 0.5s, transform 0.5s 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .gacha-overlay.reveal .gacha-name { opacity:1; transform:translateY(0) scale(1); }
  .gacha-name.rare {
    color:#ffd700; font-size:1.7rem;
    text-shadow: 0 0 25px rgba(255,215,0,0.6), 0 0 50px rgba(255,100,0,0.3);
  }

  .gacha-variant-badge {
    display:inline-block; margin-top:10px; padding:5px 16px;
    border-radius:20px; font-size:0.85rem; font-weight:700;
    opacity:0; transform:scale(0);
    transition: opacity 0.3s 0.7s, transform 0.4s 0.7s cubic-bezier(0.34,1.56,0.64,1);
  }
  .gacha-overlay.reveal .gacha-variant-badge { opacity:1; transform:scale(1); }
  .gacha-variant-badge.gold { background:linear-gradient(135deg,#ffd700,#ff8f00); color:#3e2723; }
  .gacha-variant-badge.albino { background:linear-gradient(135deg,#fff,#ffcdd2); color:#4a148c; }
  .gacha-variant-badge.neon { background:linear-gradient(135deg,#00ffc8,#00b8d4); color:#004d40; }
  .gacha-variant-badge.holo { background:linear-gradient(135deg,#f44336,#4caf50,#2196f3,#ff9800); color:#fff; }

  .gacha-income {
    color:rgba(255,215,0,0.8); font-size:0.85rem; margin-top:8px;
    opacity:0; transition: opacity 0.4s 0.8s;
  }
  .gacha-overlay.reveal .gacha-income { opacity:1; }

  .gacha-close-hint {
    color:rgba(126,200,227,0.35); font-size:0.7rem; margin-top:24px;
    opacity:0; transition: opacity 0.4s 1s;
    animation: gachaBlink 2s ease-in-out infinite 1.5s;
  }
  .gacha-overlay.reveal .gacha-close-hint { opacity:1; }
  @keyframes gachaBlink {
    0%, 100% { opacity:0.35; }
    50% { opacity:0.7; }
  }

  /* スキップヒント */
  .gacha-skip-hint {
    position:fixed; bottom:12%; left:50%; transform:translateX(-50%);
    z-index:210; color:rgba(126,200,227,0.4); font-size:0.75rem;
    opacity:0; transition:opacity 0.3s;
    pointer-events:none;
  }
  .gacha-skip-hint.show { opacity:1; }

  /* 紙吹雪 */
  .gacha-confetti {
    position:absolute; width:8px; height:8px; border-radius:2px;
    animation: confettiFall linear forwards;
    pointer-events:none;
  }
  @keyframes confettiFall {
    0% { transform:translateY(-30px) rotate(0deg) scale(1); opacity:1; }
    100% { transform:translateY(350px) rotate(720deg) scale(0.2); opacity:0; }
  }

  /* フラッシュ */
  .gacha-flash {
    position:fixed; inset:0; z-index:205; pointer-events:none;
    background:#fff; opacity:0; transition: opacity 0.1s;
  }
  .gacha-flash.active { opacity:0.8; }

  /* カウントダウン */
  .gacha-opening {
    color:#ffd700; font-size:3rem; font-weight:900;
    text-shadow: 0 0 40px rgba(255,215,0,0.6);
    animation: gachaCountPulse 0.45s ease-out;
  }
  @keyframes gachaCountPulse {
    0% { transform:scale(2.5); opacity:0; }
    60% { transform:scale(0.9); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }

  /* 多連ガチャ結果のグリッド項目アニメ */
  .gacha-multi-card {
    opacity:0; transform:translateY(20px) scale(0.9);
    animation: multiCardIn 0.4s ease-out forwards;
  }
  @keyframes multiCardIn {
    to { opacity:1; transform:translateY(0) scale(1); }
  }

  /* 多連結果のカウンター */
  .gacha-counter {
    position:fixed; top:8%; left:50%; transform:translateX(-50%);
    z-index:210; color:rgba(255,255,255,0.6); font-size:0.9rem;
    font-weight:bold; pointer-events:none;
  }

  .area-tabs {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    justify-content: center;
    width: min(800px, calc(100vw - 40px));
  }
  .area-tab {
    font-family: 'Zen Maru Gothic', sans-serif;
    padding: 5px 13px;
    border: 2px solid rgba(180,160,120,0.25);
    border-top: none;
    border-radius: 0 0 12px 12px;
    background: rgba(255,250,240,0.5);
    color: #8a7a60;
    font-size: 0.72rem;
    cursor: pointer;

  .area-tab:hover { background: rgba(255,250,240,0.8); }

    opacity: 0.6;

  }
  /* ===== ランダムイベント演出 ===== */
  .event-overlay {
    display:none; position:fixed; inset:0; z-index:150;
    align-items:center; justify-content:center; pointer-events:none;
  }
  .event-overlay.open { display:flex; pointer-events:auto; }
  .shark-overlay { background:rgba(180,0,0,0); transition:background 0.5s; }

  .shark-icon {
    position:fixed; top:50%; font-size:6rem;
    transform:translateY(-50%);
    animation:sharkSwim 1.5s ease-in-out forwards;
    filter:drop-shadow(0 0 20px rgba(255,0,0,0.8));
    z-index:151;
  }
  @keyframes sharkSwim {
    0%{left:-120px} 40%{left:45%} 60%{left:55%} 100%{left:calc(100% + 120px)}
  }
  .coin-rain-particle {
    position:fixed; font-size:1.5rem; pointer-events:none; z-index:151;
    animation:coinFall linear forwards;
  }
  @keyframes coinFall {
    0%{transform:translateY(-40px) rotate(0deg);opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0.3}
  }
  .golden-time-indicator {
    position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,#ffd700,#ff8f00,#ffd700);
    border-radius:0 0 4px 4px;
    box-shadow:0 0 12px rgba(255,215,0,0.6);
    z-index:15; animation:goldenPulse 1s ease-in-out infinite;
  }
  @keyframes goldenPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
  .golden-time-text {
    position:absolute; top:6px; right:8px;
    color:#ffd700; font-size:0.7rem; font-weight:700;
    text-shadow:0 0 8px rgba(255,215,0,0.5); z-index:16;
  }
  .event-notification {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:160; text-align:center; pointer-events:none;
  }
  .event-notification-text {
    color:#fff; font-size:1.8rem; font-weight:900;
    text-shadow:0 0 30px rgba(255,255,255,0.5);
    animation:eventTextIn 0.5s ease-out;
  }
  @keyframes eventTextIn {
    0%{transform:scale(2.5);opacity:0} 60%{transform:scale(0.9);opacity:1} 100%{transform:scale(1);opacity:1}
  }
  .event-flash {
    position:fixed; inset:0; z-index:155; pointer-events:none;
    opacity:0; transition:opacity 0.1s;
  }
  .event-flash.red { background:rgba(255,0,0,0.6); }
  .event-flash.gold { background:rgba(255,215,0,0.5); }
  .event-flash.active { opacity:1; }
  .treasure-reveal {
    font-size:4rem; z-index:152;
    animation:treasurePop 1s ease-out forwards;
  }
  @keyframes treasurePop {
    0%{transform:scale(0) rotate(-30deg);opacity:0}
    50%{transform:scale(1.3) rotate(5deg);opacity:1}
    100%{transform:scale(1) rotate(0deg);opacity:1}
  }

  /* ===== 水質バー ===== */
  .water-quality-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.7rem;
    color: #5a9bb5;
  }
  .wq-bar-track {
    width: 50px;
    height: 7px;
    background: rgba(140,180,200,0.15);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(140,180,200,0.25);
  }
  .wq-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #6ac0a0, #80d0c0);
    transition: width 0.5s, background 0.5s;
  }
  .wq-bar-fill.warn {
    background: linear-gradient(90deg, #d4a840, #e0c060);
  }
  .wq-bar-fill.danger {

  }

  .fish-count-display {
    font-size: 0.7rem;
    color: #5a8a60;
    font-weight: 700;
  }

  /* ===== 来客表示 ===== */
  .visitor-display {
    font-size: 0.7rem;
    color: #8a9a80;
  }

  /* ===== 来客通路（水槽の外） ===== */
  .visitor-walkway-outer {
    position: relative;
    width: min(800px, calc(100vw - 40px));
    height: 30px;
    overflow: hidden;
    margin-top: 2px;
  }
  .visitor-sprite {
    position: absolute;
    bottom: 2px;
    transition: left 0.3s linear;
    line-height: 1;

  /* かわいい来客キャラ */
  .v-char {
    width: 22px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .v-head {

    position: relative;
    border: 1.5px solid #d4a070;
    z-index: 1;
  }
  .v-head::before, .v-head::after {
    content: '';
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #4a3a2a;
    top: 7px;
  }
  .v-head::before { left: 4px; }
  .v-head::after { right: 4px; }
  .v-mouth {
    position: absolute;
    bottom: 3px;

  .v-blush-l, .v-blush-r {

  }
  .v-blush-l { left: 1px; }
  .v-blush-r { right: 1px; }
  .v-hair {
    position: absolute;

  }
  .v-body {
    width: 16px; height: 10px;
    border-radius: 3px 3px 6px 6px;
    margin-top: -2px;
    border: 1.2px solid rgba(0,0,0,0.1);

  .v-boy .v-body { background: #6aade8; }
  .v-girl .v-hair { background: #b06030; height:12px; border-radius:10px; }
  .v-girl .v-body { background: #f0a0b0; }
  .v-man .v-hair { background: #3a2a1a; }
  .v-man .v-body { background: #5080b0; }
  .v-woman .v-hair { background: #8a5030; height:12px; border-radius:10px; }
  .v-woman .v-body { background: #e08090; }
  .v-grandpa .v-hair { background: #c0b8b0; }
  .v-grandpa .v-body { background: #8a9a70; }
  .v-grandma .v-hair { background: #d0c8c0; height:12px; border-radius:10px; }
  .v-grandma .v-body { background: #b080a0; }
  .v-baby .v-head { width:16px; height:16px; }
  .v-baby .v-hair { background: #e0c8a0; height:6px; }
  .v-baby .v-body { background: #f0e080; width:12px; height:8px; }
  .v-scientist .v-hair { background: #f0f0f0; }
  .v-scientist .v-body { background: #f0f0f0; }
  .v-scientist .v-head::before, .v-scientist .v-head::after { background: #2060c0; border-radius: 0; width:4px; height:2px; border: 0.5px solid #2060c0; }
  .v-princess .v-hair { background: #ffd700; height:12px; }
  .v-princess .v-body { background: #f0c0d0; }
  .v-princess::before {
    content: '👑';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    z-index: 3;
  }
  .v-camera .v-hair { background: #5a4a3a; }
  .v-camera .v-body { background: #708090; }
  .v-camera::after {
    content: '📷';
    position: absolute;
    top: 10px;
    right: -6px;
    font-size: 7px;
    z-index: 3;
  }
  .visitor-react {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    animation: reactPop 1.5s ease-out forwards;
    pointer-events: none;
    white-space: nowrap;
  }
  @keyframes reactPop {
    0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-12px) scale(1.2); }
  }

  /* ===== スマホ対応 ===== */
  @media (max-width: 600px) {

    .income-display { font-size: 0.65rem; }

    .progress-display .prog-bar { width: 36px; }

    .tank-wrapper {

    .area-tabs {

</style>
</head>

<script>
// Canvas & 基本設定
const canvas = document.getElementById('tank');
const ctx = canvas.getContext('2d');
const tankWrapper = document.getElementById('tankWrapper');
function resize() {
  const isMobile = window.innerWidth <= 600;
  const margin = isMobile ? 16 : 40;
  const reservedH = isMobile ? 160 : 200;
  const w = Math.min(window.innerWidth - margin, 800);
  const h = Math.min(window.innerHeight - reservedH, 480);
  canvas.width = w; canvas.height = h;
}
resize();
window.addEventListener('resize', () => { resize(); initEnvironment(); });
</script>
